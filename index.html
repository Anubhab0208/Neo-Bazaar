<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neo-Bazaar — Home</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-900">

<!-- NAV -->
<header class="bg-white shadow p-4 flex justify-between items-center">
  <h1 class="text-xl font-bold">Neo-Bazaar</h1>

  <div class="flex items-center gap-4">

    <button id="loginBtn" class="bg-indigo-600 text-white px-4 py-2 rounded">
      Login
    </button>

    <div id="profileArea" class="hidden flex items-center gap-3">
      <span id="profileName" class="font-medium"></span>
      <button id="logoutBtn" class="text-red-500">Logout</button>
    </div>

  </div>
</header>

<!-- PRODUCTS -->
<main class="p-6">
  <h2 class="text-xl font-semibold mb-4">Products</h2>

  <div id="productContainer" class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <!-- products load dynamically -->
  </div>
</main>

<!-- LOGIN MODAL -->
<div id="modal" class="hidden fixed inset-0 bg-black/50 flex justify-center items-center">
  <div class="bg-white p-6 rounded w-80">

    <h2 class="text-lg font-bold mb-3">Login</h2>

    <input id="email" type="email" placeholder="Email"
      class="border w-full p-2 mb-2" autocomplete="email">

    <input id="password" type="password" placeholder="Password"
      class="border w-full p-2 mb-3" autocomplete="current-password">

    <button id="loginSubmit"
      class="bg-indigo-600 text-white px-4 py-2 w-full">
      Login
    </button>

    <button id="closeModal" class="mt-2 w-full border p-2">
      Cancel
    </button>

    <p id="loginError" class="text-sm text-red-600 mt-3 hidden"></p>

  </div>
</div>

<!-- EXTERNAL JS ONLY -->
<script src="/assets/js/app.js"></script>

</body>
</html>
