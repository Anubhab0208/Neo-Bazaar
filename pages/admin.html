<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neo-Bazaar — Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

<!-- Header -->
<header class="bg-gray-900 text-white p-4 shadow-lg">
  <div class="max-w-7xl mx-auto flex justify-between items-center">
    <div>
      <h1 class="text-2xl font-bold">Neo-Bazaar Admin</h1>
      <p class="text-sm text-gray-400">Product & Complaint Management</p>
    </div>

    <a href="/" class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded transition">
      🏠 View Store
    </a>
  </div>
</header>

<div class="max-w-7xl mx-auto p-6">

  <!-- Two Column Layout -->
  <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">

    <!-- Add Product -->
    <div class="bg-white rounded-xl shadow-lg p-6">
      <h2 class="text-xl font-bold mb-4">Add New Product</h2>

      <div class="space-y-4">

        <div>
          <label class="block text-sm font-medium mb-1">Product Name</label>
          <input id="prodName" type="text"
            class="w-full border rounded-lg p-2"
            placeholder="Wireless Headphones">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Brand</label>
          <textarea id="prodBrand"
            class="w-full border rounded-lg p-2"
            rows="3"
            placeholder="Brand name"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Price (USD)</label>
          <input id="prodPrice" type="number" step="0.01"
            class="w-full border rounded-lg p-2"
            placeholder="49.99">
        </div>

        <div>
          <label class="block text-sm font-medium mb-1">Image URL</label>
          <input id="prodImage" type="url"
            class="w-full border rounded-lg p-2"
            placeholder="https://example.com/image.jpg">
        </div>

        <button id="addProductBtn"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 rounded-lg transition">
           Add Product
        </button>

      </div>
    </div>

    <!-- Complaints -->
    <div class="bg-white rounded-xl shadow-lg p-6">
      <h2 class="text-xl font-bold mb-4"> Customer Complaints</h2>

      <div id="complaintsList" class="space-y-3 max-h-96 overflow-y-auto">
        <p class="text-gray-400 text-center py-8">Loading complaints...</p>
      </div>
    </div>

  </div>

  <!-- Product Dashboard -->
  <div class="bg-white rounded-xl shadow-lg p-6">
    <h2 class="text-xl font-bold mb-4"> Product Dashboard</h2>

    <div id="adminProductsGrid"
      class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-4">
      <p class="text-gray-400 col-span-full text-center py-8">
        Loading products...
      </p>
    </div>
  </div>

</div>

<script>
const API_BASE = `${window.location.origin}/api`;

function escapeHtml(str = '') {
  return String(str).replace(/[&<>"]/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;'
  }[m]));
}

/* LOAD PRODUCTS */
async function loadAdminProducts() {
  const container = document.getElementById('adminProductsGrid');

  try {
    const res = await fetch(`${API_BASE}/products`);
    const products = await res.json();

    if (!products.length) {
      container.innerHTML =
        '<p class="text-gray-400 col-span-full text-center py-8">No products yet</p>';
      return;
    }

    container.innerHTML = products.map(p => `
      <div class="border rounded-lg p-3 bg-gray-50 hover:shadow">
        <img src="${p.image || ''}"
             class="w-full h-40 object-cover rounded"
             onerror="this.src='https://placehold.co/400x300?text=No+Image'">

        <p class="font-bold mt-2">${escapeHtml(p.name)}</p>
        <p class="text-sm text-gray-600">${escapeHtml(p.brand || '')}</p>
        <p class="text-green-700 font-bold mt-1">$${Number(p.price).toFixed(2)}</p>

        <button
          class="delete-btn bg-red-100 hover:bg-red-200 text-red-700 px-3 py-1 rounded w-full mt-2"
          data-id="${p._id}">
          Delete
        </button>
      </div>
    `).join('');

    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.onclick = async () => {
        if (!confirm('Delete this product?')) return;

        const res = await fetch(`${API_BASE}/products/${btn.dataset.id}`, {
          method: 'DELETE'
        });

        if (res.ok) loadAdminProducts();
        else alert('Delete failed');
      };
    });

  } catch {
    container.innerHTML =
      '<p class="text-red-500 col-span-full text-center py-8">Failed loading products</p>';
  }
}

/* ADD PRODUCT */
async function addProduct(name, brand, price, image) {
  const res = await fetch(`${API_BASE}/products`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({
      name,
      brand,
      price,
      image
    })
  });

  const data = await res.json();
  return data.success;
}

/* LOAD COMPLAINTS */


async function loadComplaints() {
  const container = document.getElementById("complaintsList");

  try {
    const res = await fetch(`${API_BASE}/complaints`);
    const complaints = await res.json();

    if (!complaints.length) {
      container.innerHTML =
        `<p class="text-green-600 text-center py-8">No complaints</p>`;
      return;
    }

    container.innerHTML = complaints.map(c => `
      <div class="border rounded-lg p-4 ${
        c.resolved ? 'bg-green-50 border-green-300' : 'bg-amber-50 border-amber-300'
      }">

        <div class="flex justify-between items-start gap-3">
          <div>
            <p class="font-bold text-sm">${escapeHtml(c.email)}</p>
            <p class="text-sm mt-1">${escapeHtml(c.message)}</p>

            <p class="text-xs text-gray-500 mt-2">
              ${new Date(c.createdAt).toLocaleString()}
            </p>

            <p class="text-xs font-semibold mt-1 ${
              c.resolved ? 'text-green-700' : 'text-amber-700'
            }">
              ${c.resolved ? 'Resolved' : 'Pending'}
            </p>
          </div>

          <div class="flex flex-col gap-2 min-w-[100px]">

            ${
              !c.resolved
              ? `
              <button
                class="resolve-btn bg-green-600 hover:bg-green-700 text-white px-3 py-1 rounded text-sm"
                data-id="${c._id}">
                Resolve
              </button>
              `
              : ''
            }

            <button
              class="delete-complaint-btn bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded text-sm"
              data-id="${c._id}">
              Delete
            </button>

          </div>
        </div>
      </div>
    `).join("");

    // Resolve buttons
    document.querySelectorAll(".resolve-btn").forEach(btn => {
      btn.onclick = async () => {
        const res = await fetch(
          `${API_BASE}/complaints/${btn.dataset.id}/resolve`,
          { method: "PUT" }
        );

        if (res.ok) loadComplaints();
        else alert("Failed to resolve complaint");
      };
    });

    // Delete buttons
    document.querySelectorAll(".delete-complaint-btn").forEach(btn => {
      btn.onclick = async () => {
        if (!confirm("Delete complaint?")) return;

        const res = await fetch(
          `${API_BASE}/complaints/${btn.dataset.id}`,
          { method: "DELETE" }
        );

        if (res.ok) loadComplaints();
        else alert("Delete failed");
      };
    });

  } catch {
    container.innerHTML =
      `<p class="text-red-500 text-center py-8">Failed loading complaints</p>`;
  }
}


/* BUTTON EVENT */
document.getElementById('addProductBtn').onclick = async () => {
  const name = prodName.value.trim();
  const brand = prodBrand.value.trim();
  const price = parseFloat(prodPrice.value);
  const image = prodImage.value.trim();

  if (!name || !brand || isNaN(price) || !image) {
    alert('Fill all fields');
    return;
  }

  const ok = await addProduct(name, brand, price, image);

  if (ok) {
    prodName.value = '';
    prodBrand.value = '';
    prodPrice.value = '';
    prodImage.value = '';

    alert('Product added');
    loadAdminProducts();
  } else {
    alert('Failed');
  }
};

/* INIT */
loadAdminProducts();
loadComplaints();
setInterval(loadComplaints, 10000);
</script>

</body>
</html>
