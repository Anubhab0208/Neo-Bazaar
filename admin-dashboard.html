<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo-Bazaar | Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <nav class="bg-indigo-600 p-4 text-white flex justify-between">
        <h1 class="text-xl font-bold">Admin Panel</h1>
        <a href="/" class="bg-red-500 px-4 py-2 rounded">Logout</a>
    </nav>
    
    <div class="p-8">
        <h2 class="text-2xl font-semibold mb-4">Welcome, Admin</h2>
        <div class="bg-white p-6 rounded shadow-md">
            <p class="text-gray-600">You are successfully logged in using the credentials from your .env file.</p>
            <div class="mt-6 flex gap-4">
                <button class="bg-green-500 text-white px-4 py-2 rounded">Add New Product</button>
                <button class="bg-blue-500 text-white px-4 py-2 rounded">View Orders</button>
            </div>
        </div>
    </div>
</body>
</html>
